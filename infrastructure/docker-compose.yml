services:
  postgres:
    image: postgres:16
    container_name: orderflow-postgres
    environment:
      POSTGRES_DB: order_flow_lab
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow
    ports:
      - "5432:5432"
    volumes:
      - orderflow_postgres_data:/var/lib/postgresql/data

volumes:
  orderflow_postgres_data: